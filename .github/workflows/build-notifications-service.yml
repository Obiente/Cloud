name: Build and Push Notifications Service

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apps/notifications-service/**"
      - "apps/shared/pkg/auth/**"
      - "apps/shared/pkg/database/**"
      - "apps/shared/pkg/logger/**"
      - "apps/shared/pkg/health/**"
      - "apps/shared/proto/obiente/cloud/notifications/**"
      - "apps/shared/proto/obiente/cloud/common/**"
      - "packages/proto/proto/obiente/cloud/notifications/**"
      - "packages/proto/proto/obiente/cloud/common/**"
      - "apps/shared/go.mod"
      - "apps/shared/go.sum"
      - ".github/scripts/go-service-affected.sh"
      - ".github/workflows/build-notifications-service.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/notifications-service/**"
      - "apps/shared/pkg/auth/**"
      - "apps/shared/pkg/database/**"
      - "apps/shared/pkg/logger/**"
      - "apps/shared/pkg/health/**"
      - "apps/shared/proto/obiente/cloud/notifications/**"
      - "apps/shared/proto/obiente/cloud/common/**"
      - "packages/proto/proto/obiente/cloud/notifications/**"
      - "packages/proto/proto/obiente/cloud/common/**"
      - "apps/shared/go.mod"
      - "apps/shared/go.sum"
      - ".github/scripts/go-service-affected.sh"
      - ".github/workflows/build-notifications-service.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      affected: ${{ steps.detect.outputs.affected }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Detect whether notifications-service is actually affected
        id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: bash ./.github/scripts/go-service-affected.sh "notifications-service" "${{ github.event.pull_request.base.sha }}" "${{ github.event.before }}" "${{ github.sha }}"

  build-and-push-notifications-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.affected == 'true'
    name: Build and Push Notifications Service (${{ matrix.platform }})
    runs-on: self-hosted
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
      fail-fast: false
    env:
      REGISTRY: ghcr.io
      SERVICE_NAME: notifications-service
      IMAGE_NAME: ghcr.io/obiente/cloud-notifications-service
      LOCAL_REGISTRY: registry.obiente.cloud
      BASE_REGISTRY: registry.obiente.cloud/dockerhub
      BUILDKIT_IMAGE: registry.obiente.cloud/dockerhub/moby/buildkit:buildx-stable-1
      CACHE_IMAGE: registry.obiente.cloud/buildcache/notifications-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}
            network=host

      - name: Log in to Obiente Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.LOCAL_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Get commit message
        id: commit-msg
        run: |
          COMMIT_MSG=$(git log -1 --format=%s ${{ github.sha }})
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Notifications Service Docker image (${{ matrix.platform }}) - attempt 1
        id: build-attempt-1
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          file: ./apps/${{ env.SERVICE_NAME }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.IMAGE_NAME }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_REGISTRY=${{ env.BASE_REGISTRY }}
            COMMIT=${{ github.sha }}
            COMMIT_MESSAGE=${{ steps.commit-msg.outputs.message }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }},mode=max
          platforms: ${{ matrix.platform }}
          builder: ${{ steps.buildx.outputs.name }}

      - name: Build and push Notifications Service Docker image (${{ matrix.platform }}) - attempt 2
        if: steps.build-attempt-1.outcome == 'failure'
        id: build-attempt-2
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          file: ./apps/${{ env.SERVICE_NAME }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.IMAGE_NAME }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_REGISTRY=${{ env.BASE_REGISTRY }}
            COMMIT=${{ github.sha }}
            COMMIT_MESSAGE=${{ steps.commit-msg.outputs.message }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }},mode=max
          platforms: ${{ matrix.platform }}
          builder: ${{ steps.buildx.outputs.name }}

      - name: Build and push Notifications Service Docker image (${{ matrix.platform }}) - attempt 3
        if: steps.build-attempt-2.outcome == 'failure'
        id: build-attempt-3
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ env.SERVICE_NAME }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.IMAGE_NAME }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_REGISTRY=${{ env.BASE_REGISTRY }}
            COMMIT=${{ github.sha }}
            COMMIT_MESSAGE=${{ steps.commit-msg.outputs.message }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }},mode=max
          platforms: ${{ matrix.platform }}
          builder: ${{ steps.buildx.outputs.name }}
