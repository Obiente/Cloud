name: Sync Base Images to Obiente Registry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

concurrency:
  group: sync-base-images
  cancel-in-progress: false

jobs:
  sync:
    runs-on: self-hosted
    env:
      LOCAL_REGISTRY: registry.obiente.cloud
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Obiente Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.LOCAL_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Mirror hot base images
        run: |
          set -euo pipefail

          # Format: "ecr-primary|dockerhub-fallback|target"
          # ECR Public is primary (authenticated = no rate limit); Docker Hub is fallback
          # dockerhub-fallback is empty for images not available on Docker Hub as library images
          images=(
            "docker.io/moby/buildkit:buildx-stable-1||${LOCAL_REGISTRY}/dockerhub/moby/buildkit:buildx-stable-1"
            "public.ecr.aws/docker/library/golang:1.25-alpine|docker.io/library/golang:1.25-alpine|${LOCAL_REGISTRY}/dockerhub/library/golang:1.25-alpine"
            "public.ecr.aws/docker/library/alpine:latest|docker.io/library/alpine:latest|${LOCAL_REGISTRY}/dockerhub/library/alpine:latest"
            "public.ecr.aws/docker/library/node:22-alpine|docker.io/library/node:22-alpine|${LOCAL_REGISTRY}/dockerhub/library/node:22-alpine"
            "public.ecr.aws/docker/library/node:20-alpine|docker.io/library/node:20-alpine|${LOCAL_REGISTRY}/dockerhub/library/node:20-alpine"
            "public.ecr.aws/docker/library/rust:1.75-alpine|docker.io/library/rust:1.75-alpine|${LOCAL_REGISTRY}/dockerhub/library/rust:1.75-alpine"
          )

          try_sync() {
            local source_ref="$1"
            local target_ref="$2"
            local max_attempts=3
            local attempt=1
            local delay=30

            while [[ $attempt -le $max_attempts ]]; do
              echo "  Trying ${source_ref} -> ${target_ref} (attempt ${attempt}/${max_attempts})"
              if docker buildx imagetools create --tag "${target_ref}" "${source_ref}"; then
                return 0
              fi
              echo "  Attempt ${attempt} failed. Waiting ${delay}s..."
              sleep "$delay"
              delay=$(( delay * 2 ))
              attempt=$(( attempt + 1 ))
            done
            return 1
          }

          sync_with_fallback() {
            local primary_ref="$1"
            local fallback_ref="$2"
            local target_ref="$3"

            if try_sync "${primary_ref}" "${target_ref}"; then
              echo "Synced from primary: ${primary_ref}"
            elif [[ -n "${fallback_ref}" ]]; then
              echo "Primary failed, falling back to: ${fallback_ref}"
              try_sync "${fallback_ref}" "${target_ref}"
              echo "Synced from fallback: ${fallback_ref}"
            else
              echo "ERROR: All sources failed for ${primary_ref}"
              return 1
            fi

            if ! docker buildx imagetools inspect "${target_ref}" >/dev/null; then
              echo "Verification warning: inspect failed for ${target_ref}"
            fi
          }

          first=true
          for image in "${images[@]}"; do
            IFS='|' read -r primary_ref fallback_ref target_ref <<< "${image}"

            if [[ "$first" == "true" ]]; then
              first=false
            else
              sleep 10
            fi

            sync_with_fallback "${primary_ref}" "${fallback_ref}" "${target_ref}"
          done
