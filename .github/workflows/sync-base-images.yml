name: Sync Base Images to Obiente Registry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

concurrency:
  group: sync-base-images
  cancel-in-progress: false

jobs:
  sync:
    runs-on: self-hosted
    env:
      LOCAL_REGISTRY: registry.obiente.cloud
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: obiente-sync-base-images

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Obiente Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.LOCAL_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Mirror hot base images
        run: |
          set -euo pipefail

          images=(
            "docker.io/moby/buildkit:buildx-stable-1|${LOCAL_REGISTRY}/dockerhub/moby/buildkit:buildx-stable-1"
            "docker.io/library/golang:1.25-alpine|${LOCAL_REGISTRY}/dockerhub/library/golang:1.25-alpine"
            "docker.io/library/alpine:latest|${LOCAL_REGISTRY}/dockerhub/library/alpine:latest"
            "docker.io/library/node:22-alpine|${LOCAL_REGISTRY}/dockerhub/library/node:22-alpine"
            "docker.io/library/node:20-alpine|${LOCAL_REGISTRY}/dockerhub/library/node:20-alpine"
            "docker.io/library/rust:1.75-alpine|${LOCAL_REGISTRY}/dockerhub/library/rust:1.75-alpine"
          )

          for image in "${images[@]}"; do
            source_ref="${image%%|*}"
            target_ref="${image##*|}"

            echo "Syncing ${source_ref} -> ${target_ref}"
            docker buildx imagetools create --tag "${target_ref}" "${source_ref}"
            docker buildx imagetools inspect "${target_ref}"
          done
