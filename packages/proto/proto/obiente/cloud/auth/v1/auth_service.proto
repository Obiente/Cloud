syntax = "proto3";

package obiente.cloud.auth.v1;

option go_package = "github.com/obiente/cloud/apps/shared/proto/obiente/cloud/auth/v1;authv1";

import "google/protobuf/timestamp.proto";

service AuthService {
  // Get public configuration (no authentication required)
  rpc GetPublicConfig(GetPublicConfigRequest) returns (GetPublicConfigResponse);
  
  // Login with email and password using service account
  // This endpoint does not require authentication (public)
  rpc Login(LoginRequest) returns (LoginResponse);
  
  // Get current authenticated user
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
  
  // Update user profile information
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UpdateUserProfileResponse);
  
  // Connect GitHub App installation to an Obiente organization/workspace
  rpc ConnectOrganizationGitHubApp(ConnectOrganizationGitHubAppRequest) returns (ConnectOrganizationGitHubAppResponse);
  
  // Disconnect GitHub App installation from an Obiente organization/workspace
  rpc DisconnectOrganizationGitHubApp(DisconnectOrganizationGitHubAppRequest) returns (DisconnectOrganizationGitHubAppResponse);
  
  // List GitHub App integrations available to the user
  rpc ListGitHubIntegrations(ListGitHubIntegrationsRequest) returns (ListGitHubIntegrationsResponse);
}

// Public Configuration Messages
message GetPublicConfigRequest {}

message GetPublicConfigResponse {
  bool billing_enabled = 1;
  bool self_hosted = 2;
  bool disable_auth = 3;
}

// Empty request for getting current user
message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  User user = 1;
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string avatar_url = 4;
  google.protobuf.Timestamp created_at = 5;
  string timezone = 6;
  // Extended Zitadel userinfo fields
  string given_name = 7;
  string family_name = 8;
  string preferred_username = 9;
  bool email_verified = 10;
  string locale = 11;
  google.protobuf.Timestamp updated_at = 12;
  repeated string roles = 13;
}

// GitHub App Integration Messages
message ConnectOrganizationGitHubAppRequest {
  string organization_id = 1;
  int64 installation_id = 2;
  string account_login = 3;
  string account_type = 4;
  string repository_selection = 5;
  string setup_code = 6; // one-time GitHub App user authorization code used to verify installer access
}

message ConnectOrganizationGitHubAppResponse {
  bool success = 1;
  string account_login = 2;
  int64 installation_id = 3;
}

message DisconnectOrganizationGitHubAppRequest {
  string organization_id = 1;
}

message DisconnectOrganizationGitHubAppResponse {
  bool success = 1;
}

message ListGitHubIntegrationsRequest {}

message GitHubIntegrationInfo {
  string id = 1;
  string username = 2;
  string scope = 3;
  bool is_user = 4; // legacy field; GitHub App integrations are organization/workspace scoped
  string organization_id = 5;
  string organization_name = 6;
  google.protobuf.Timestamp connected_at = 7;
  string auth_type = 8; // github_app
  int64 github_app_installation_id = 9;
  string github_app_account_login = 10;
  string github_app_account_type = 11;
}

message ListGitHubIntegrationsResponse {
  repeated GitHubIntegrationInfo integrations = 1;
}

// User Profile Update Messages
message UpdateUserProfileRequest {
  // Optional: Update given name (first name)
  optional string given_name = 1;
  // Optional: Update family name (last name)
  optional string family_name = 2;
  // Optional: Update display name
  optional string name = 3;
  // Optional: Update preferred username
  optional string preferred_username = 4;
  // Optional: Update locale
  optional string locale = 5;
}

message UpdateUserProfileResponse {
  User user = 1; // Updated user information
}

// Login Messages
message LoginRequest {
  string email = 1;
  string password = 2;
  bool remember_me = 3; // Whether to set a longer session expiry
}

message LoginResponse {
  bool success = 1;
  string access_token = 2; // OAuth2 access token
  string refresh_token = 3; // OAuth2 refresh token
  int32 expires_in = 4; // Token expiry in seconds
  string message = 5; // Error message if success is false
}
